version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_dw
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5433"
    volumes:
      # persistent database storage
      - postgres_data:/var/lib/postgresql_dw/data
      # optional: run custom SQL init scripts
      # - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - postgres_network

volumes:
  postgres_data:

networks:
  postgres_network:
